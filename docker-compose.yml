version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sentinelx-postgres
    environment:
      POSTGRES_USER: sentinelx_admin
      POSTGRES_PASSWORD: SecurePass@123
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_stat_statements"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sentinelx_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelx_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sentinelx-redis
    command: redis-server --appendonly yes --requirepass RedisPass@123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentinelx_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sentinelx-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: sentinelx
      RABBITMQ_DEFAULT_PASS: RabbitPass@123
      RABBITMQ_DEFAULT_VHOST: /sentinelx
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - sentinelx_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinelx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sentinelx_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: sentinelx-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: Admin@123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - sentinelx_network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Loki Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: sentinelx-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - sentinelx_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: sentinelx-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "9411:9411"   # Zipkin HTTP receiver
    volumes:
      - ./infrastructure/otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    networks:
      - sentinelx_network
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway (will be deployed as container later)
  # api-gateway:
  #   build:
  #     context: ./gateway
  #     dockerfile: Dockerfile
  #   container_name: sentinelx-gateway
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: Docker
  #   networks:
  #     - sentinelx_network
  #   depends_on:
  #     - postgres
  #     - redis
  #     - rabbitmq

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  sentinelx_network:
    driver: bridge
