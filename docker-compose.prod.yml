version: '3.9'

services:
  # API Gateway
  gateway:
    image: sentinelx/gateway:latest
    container_name: sentinelx-gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AuthService: "http://auth-service:8080"
      ConnectionStrings__UserService: "http://user-service:8080"
      Redis__Connection: "redis:6379"
    depends_on:
      - redis
      - postgres
    networks:
      - sentinelx-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auth Service
  auth-service:
    image: sentinelx/auth-service:latest
    container_name: sentinelx-auth
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AuthDb: "Host=postgres;Port=5432;Database=sentinelx_auth;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Redis__Connection: "redis:6379"
      RabbitMQ__HostName: "rabbitmq"
      Jwt__SecretKey: "${JWT_SECRET}"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - sentinelx-network
    restart: always

  # User Service
  user-service:
    image: sentinelx/user-service:latest
    container_name: sentinelx-user
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__UserDb: "Host=postgres;Port=5432;Database=sentinelx_user;Username=postgres;Password=${POSTGRES_PASSWORD};"
      Redis__Connection: "redis:6379"
    depends_on:
      - postgres
      - redis
    networks:
      - sentinelx-network
    restart: always

  # Audit Service
  audit-service:
    image: sentinelx/audit-service:latest
    container_name: sentinelx-audit
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__AuditDb: "Host=postgres;Port=5432;Database=sentinelx_audit;Username=postgres;Password=${POSTGRES_PASSWORD};"
    depends_on:
      - postgres
    networks:
      - sentinelx-network
    restart: always

  # Notification Service
  notification-service:
    image: sentinelx/notification-service:latest
    container_name: sentinelx-notification
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      RabbitMQ__HostName: "rabbitmq"
      SMTP__Host: "${SMTP_HOST}"
      SMTP__Port: "${SMTP_PORT}"
      SMTP__Username: "${SMTP_USERNAME}"
      SMTP__Password: "${SMTP_PASSWORD}"
    depends_on:
      - rabbitmq
    networks:
      - sentinelx-network
    restart: always

  # Security Engine
  security-engine:
    image: sentinelx/security-engine:latest
    container_name: sentinelx-security
    ports:
      - "5005:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Redis__Connection: "redis:6379"
    depends_on:
      - redis
    networks:
      - sentinelx-network
    restart: always

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: sentinelx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - sentinelx-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: sentinelx-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sentinelx-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: sentinelx-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - sentinelx-network
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: sentinelx-otel
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infrastructure/otel/otel-collector-config.yml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    depends_on:
      - prometheus
      - loki
    networks:
      - sentinelx-network
    restart: always

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinelx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - sentinelx-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Loki
  loki:
    image: grafana/loki:latest
    container_name: sentinelx-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sentinelx-network
    restart: always

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: sentinelx-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: "redis-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infrastructure/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
    depends_on:
      - prometheus
      - loki
    networks:
      - sentinelx-network
    restart: always

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sentinelx-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
      - grafana
    networks:
      - sentinelx-network
    restart: always

networks:
  sentinelx-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  loki_data:
  grafana_data:
