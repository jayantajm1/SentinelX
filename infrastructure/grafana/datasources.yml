apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    editable: true

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: sentinelx_metrics
    user: postgres
    password: postgres
    access: proxy
    editable: true
